apiVersion: apps/v1
kind: Deployment
metadata:
  name: customs-declaration-service
  namespace: iraq-nsw
  labels:
    app: customs-declaration-service
    tier: backend
    sovereign: "true"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: customs-declaration-service
  template:
    metadata:
      labels:
        app: customs-declaration-service
    spec:
      # Enforces military grade pod isolation and limits
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: customs-declaration-service
        image: gcr.io/iraq-nsw/customs-declaration-service:v1.2.0
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
          name: http-api
        
        # Microservice health readiness and liveness gates
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2

        resources:
          limits:
            cpu: "1"
            memory: "1024Mi"
          requests:
            cpu: "250m"
            memory: "512Mi"

        env:
        - name: PORT
          value: "8080"
        - name: GIN_MODE
          value: "release"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: nsw-security-keys
              key: jwt-signing-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nsw-db-endpoints
              key: spanner-postgresql-compat-url
        - name: DB_POOL_MAX_CONNS
          value: "50"

---
apiVersion: v1
kind: Service
metadata:
  name: customs-declaration-service
  namespace: iraq-nsw
  labels:
    app: customs-declaration-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
    protocol: TCP
  selector:
    app: customs-declaration-service

---
# Istio VirtualService routing rules for zero-trust traffic mesh
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: customs-declaration-routing
  namespace: iraq-nsw
spec:
  hosts:
  - "customs.nsw.gov.iq"
  gateways:
  - nsw-wildcard-gateway
  http:
  - match:
    - uri:
        prefix: /api/v1/declarations
    route:
    - destination:
        host: customs-declaration-service.iraq-nsw.svc.cluster.local
        port:
          number: 8080
      timeout: 10s
